<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Retrieve Information</title>
    <link rel="stylesheet" href="../static/css/style.css" />
</head>

<body class="page-wrapper">
  <!-- Main container -->
  <div id="main-card" class="main-card">
    <h1>Retriever</h1>

    <!-- Query bar -->
    <div class="query-bar">
      <input id="file" type="file" accept=".pdf,.txt" hidden />

      <label for="file" class="upload-btn" title="Upload document">
        <span class="upload-ico" aria-hidden="true">+</span>
      </label>

      <!-- Question input -->
      <input id="question" type="text" placeholder="Ask something from the document..." class="question-input" />

      <!-- Top‑k selector -->
      <select id="topk" class="pill-select">
        <option value="1">Top‑1</option>
        <option value="3">Top‑3</option>
        <option value="5" selected>Top‑5</option>
        <option value="10">Top‑10</option>
      </select>

      <!-- Model input -->
      <input id="model" type="text" value="gpt-oss:20b" class="pill-input" />

      <!-- Ask button -->
      <button id="askBtn" class="ask-btn" title="Send">
        <svg class="send-ico" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
        </svg>
      </button>
    </div>

    <!-- Status / Progress -->
    <div id="status" class="status">No file ingested yet.</div>

    <!-- Result area (hidden by default) -->
    <div id="answer-container" class="answer-container hidden">
      <div class="question-bubble full" id="question-display"></div>

      <div class="answer-bubble" aria-label="Answer">
        <div class="bubble-title">Answer</div>
        <div id="answer" class="answer-text"></div>
      </div>

      <div class="citations-bubble" aria-label="Citations">
        <div class="bubble-title">Citations</div>
        <div id="citations" class="citations"></div>
      </div>
    </div>
  </div>

  <!-- Script -->
  <script src="../static/js/main.js"></script>
</body>

</html>
